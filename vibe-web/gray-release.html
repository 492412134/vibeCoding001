<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灰度发布观测台</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }
        
        :root {
            --pixel-bg: #2d1b4e;
            --pixel-dark: #1a0f2e;
            --pixel-light: #4a3b69;
            --pixel-accent: #ff6b9d;
            --pixel-accent-dark: #c44569;
            --pixel-gold: #ffd700;
            --pixel-cyan: #00d9ff;
            --pixel-green: #00ff88;
            --pixel-red: #ff4757;
        }
        
        body {
            min-height: 100vh;
            background-color: var(--pixel-bg);
            font-family: 'Press Start 2P', cursive;
            overflow-x: hidden;
            position: relative;
            font-size: 12px;
        }
        
        .pixel-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0,0,0,0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none;
            z-index: 0;
        }
        
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.1) 50%,
                rgba(0,0,0,0.1)
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 100;
            opacity: 0.3;
        }
        
        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--pixel-dark);
            border: 4px solid var(--pixel-light);
            box-shadow: 0 0 0 4px var(--pixel-dark), 0 0 0 8px var(--pixel-accent);
        }
        
        .header h1 {
            font-size: 24px;
            color: var(--pixel-gold);
            text-shadow: 4px 4px 0 var(--pixel-dark), -2px -2px 0 var(--pixel-accent);
        }
        
        .header-btn {
            padding: 15px 30px;
            background: var(--pixel-accent);
            color: white;
            text-decoration: none;
            font-size: 12px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 0 var(--pixel-accent-dark);
            transition: all 0.1s;
        }
        
        .header-btn:hover {
            transform: translateY(2px);
            box-shadow: 0 2px 0 var(--pixel-accent-dark);
            background: var(--pixel-gold);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--pixel-dark);
            border: 4px solid var(--pixel-light);
            padding: 20px;
            position: relative;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border: 4px solid var(--pixel-cyan);
            clip-path: polygon(
                0 8px, 8px 8px, 8px 0,
                calc(100% - 8px) 0, calc(100% - 8px) 8px, 100% 8px,
                100% calc(100% - 8px), calc(100% - 8px) calc(100% - 8px), calc(100% - 8px) 100%,
                8px 100%, 8px calc(100% - 8px), 0 calc(100% - 8px)
            );
            pointer-events: none;
        }
        
        .stat-title {
            font-size: 10px;
            color: var(--pixel-cyan);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        
        .stat-value {
            font-size: 28px;
            color: var(--pixel-gold);
            text-shadow: 2px 2px 0 var(--pixel-dark);
        }
        
        .stat-label {
            font-size: 10px;
            color: var(--pixel-light);
            margin-top: 10px;
        }
        
        .section {
            background: var(--pixel-dark);
            border: 4px solid var(--pixel-light);
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--pixel-light);
        }
        
        .section-title {
            font-size: 14px;
            color: var(--pixel-cyan);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        
        .refresh-btn {
            padding: 10px 20px;
            background: var(--pixel-green);
            color: var(--pixel-dark);
            border: none;
            cursor: pointer;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            box-shadow: 0 4px 0 #00cc6a;
        }
        
        .refresh-btn:hover {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #00cc6a;
        }
        
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .service-card {
            background: rgba(0,0,0,0.3);
            border: 2px solid var(--pixel-light);
            padding: 15px;
        }
        
        .service-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .service-name {
            font-size: 12px;
            color: var(--pixel-gold);
        }
        
        .service-status {
            padding: 5px 10px;
            font-size: 8px;
            background: var(--pixel-green);
            color: var(--pixel-dark);
        }
        
        .service-status.disabled {
            background: var(--pixel-red);
            color: white;
        }
        
        .instance-list {
            font-size: 10px;
            color: var(--pixel-light);
        }
        
        .instance-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--pixel-light);
        }
        
        .instance-item:last-child {
            border-bottom: none;
        }
        
        .version-badge {
            padding: 3px 8px;
            font-size: 8px;
            background: var(--pixel-accent);
            color: white;
        }
        
        .version-badge.v1 {
            background: var(--pixel-cyan);
            color: var(--pixel-dark);
        }
        
        .version-badge.v2 {
            background: var(--pixel-accent);
        }
        
        .gray-rule-info {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed var(--pixel-light);
        }
        
        .gray-rule-info p {
            font-size: 10px;
            color: var(--pixel-light);
            margin-bottom: 5px;
        }
        
        .gray-rule-info .weight {
            color: var(--pixel-gold);
        }
        
        .logs-container {
            background: rgba(0,0,0,0.5);
            border: 2px solid var(--pixel-light);
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 10px;
        }
        
        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: var(--pixel-light);
            word-break: break-all;
        }
        
        .log-entry.gray {
            color: var(--pixel-accent);
        }
        
        .log-entry.normal {
            color: var(--pixel-green);
        }
        
        .no-data {
            text-align: center;
            color: var(--pixel-light);
            padding: 40px;
            font-size: 12px;
        }
        
        .progress-bar {
            width: 100%;
            height: 20px;
            background: var(--pixel-dark);
            border: 2px solid var(--pixel-light);
            margin-top: 10px;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--pixel-accent);
            transition: width 0.3s;
        }
        
        .progress-fill.normal {
            background: var(--pixel-green);
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--pixel-cyan);
            animation: blink 1s step-end infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .error-message {
            background: var(--pixel-red);
            color: white;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 10px;
        }
        
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .services-grid {
                grid-template-columns: 1fr;
            }
            
            .section-header {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="pixel-bg"></div>
    <div class="scanlines"></div>
    
    <div class="container">
        <div class="header">
            <h1>🎨 灰度发布观测台</h1>
            <a href="/index.html" class="header-btn">🏠 返回首页</a>
        </div>
        
        <div id="error-container"></div>
        
        <div class="stats-grid" id="stats-grid">
            <div class="stat-card">
                <div class="stat-title">总请求数</div>
                <div class="stat-value" id="total-requests">0</div>
                <div class="stat-label">Total Requests</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">灰度请求数</div>
                <div class="stat-value" id="gray-requests">0</div>
                <div class="stat-label">Gray Requests</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">正常请求数</div>
                <div class="stat-value" id="normal-requests">0</div>
                <div class="stat-label">Normal Requests</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">灰度比例</div>
                <div class="stat-value" id="gray-percentage">0%</div>
                <div class="stat-label">Gray Percentage</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="gray-progress" style="width: 0%"></div>
                </div>
            </div>
        </div>
        
        <div class="section">
            <div class="section-header">
                <h2 class="section-title">📊 服务实例状态</h2>
                <button class="refresh-btn" onclick="loadServices()">🔄 刷新</button>
            </div>
            <div id="services-container" class="services-grid">
                <div class="loading">Loading...</div>
            </div>
        </div>
        
        <div class="section">
            <div class="section-header">
                <h2 class="section-title">📝 路由日志</h2>
                <div>
                    <button class="refresh-btn" onclick="loadLogs()" style="margin-right: 10px;">🔄 刷新</button>
                    <button class="refresh-btn" onclick="clearLogs()" style="background: var(--pixel-red); color: white; box-shadow: 0 4px 0 #cc3344;">🗑️ 清空</button>
                </div>
            </div>
            <div id="logs-container" class="logs-container">
                <div class="loading">Loading...</div>
            </div>
        </div>
        
        <div class="section">
            <div class="section-header">
                <h2 class="section-title">⚙️ 灰度规则配置</h2>
                <button class="refresh-btn" onclick="loadRules()">🔄 刷新</button>
            </div>
            <div id="rules-container">
                <div class="loading">Loading...</div>
            </div>
        </div>
    </div>
    
    <script>
        const GATEWAY_URL = '';
        
        async function fetchAPI(endpoint) {
            try {
                const response = await fetch(`${GATEWAY_URL}${endpoint}`);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                throw error;
            }
        }
        
        function showError(message) {
            const container = document.getElementById('error-container');
            container.innerHTML = `<div class="error-message">⚠️ ${message}</div>`;
            setTimeout(() => container.innerHTML = '', 5000);
        }
        
        async function loadStats() {
            try {
                const stats = await fetchAPI('/api/gray/stats');
                document.getElementById('total-requests').textContent = stats.totalRequests || 0;
                document.getElementById('gray-requests').textContent = stats.grayRequests || 0;
                document.getElementById('normal-requests').textContent = stats.normalRequests || 0;
                document.getElementById('gray-percentage').textContent = stats.grayPercentage || '0%';
                
                const percentage = parseFloat(stats.grayPercentage) || 0;
                document.getElementById('gray-progress').style.width = percentage + '%';
            } catch (error) {
                showError('加载统计数据失败: ' + error.message);
            }
        }
        
        async function loadServices() {
            const container = document.getElementById('services-container');
            container.innerHTML = '<div class="loading">Loading...</div>';
            
            try {
                const data = await fetchAPI('/api/gray/services');
                
                if (!data.services || data.services.length === 0) {
                    container.innerHTML = '<div class="no-data">暂无服务实例</div>';
                    return;
                }
                
                container.innerHTML = data.services.map(service => `
                    <div class="service-card">
                        <div class="service-header">
                            <span class="service-name">${service.serviceName}</span>
                            <span class="service-status ${service.grayRule && service.grayRule.enabled ? '' : 'disabled'}">
                                ${service.grayRule && service.grayRule.enabled ? '灰度中' : '未启用'}
                            </span>
                        </div>
                        <div class="instance-list">
                            <p style="margin-bottom: 10px; color: var(--pixel-cyan);">实例数量: ${service.instanceCount}</p>
                            ${service.instances.map(instance => `
                                <div class="instance-item">
                                    <span>${instance.host}:${instance.port}</span>
                                    <span class="version-badge ${instance.version}">${instance.version}</span>
                                </div>
                            `).join('')}
                        </div>
                        ${service.grayRule ? `
                            <div class="gray-rule-info">
                                <p>目标版本: <span class="version-badge ${service.grayRule.version}">${service.grayRule.version}</span></p>
                                <p>灰度权重: <span class="weight">${service.grayRule.weight}%</span></p>
                                <p>匹配条件: ${service.grayRule.conditions && service.grayRule.conditions.length > 0 
                                    ? service.grayRule.conditions.map(c => `${c.type}(${c.operator})`).join(', ') 
                                    : '无'}</p>
                            </div>
                        ` : ''}
                    </div>
                `).join('');
            } catch (error) {
                container.innerHTML = '<div class="no-data">加载服务列表失败</div>';
                showError('加载服务列表失败: ' + error.message);
            }
        }
        
        async function loadLogs() {
            const container = document.getElementById('logs-container');
            
            try {
                const logs = await fetchAPI('/api/gray/logs');
                
                if (!logs || Object.keys(logs).length === 0) {
                    container.innerHTML = '<div class="no-data">暂无路由日志</div>';
                    return;
                }
                
                let allLogs = [];
                Object.entries(logs).forEach(([service, logText]) => {
                    const lines = logText.split('\n').filter(line => line.trim());
                    lines.forEach(line => {
                        allLogs.push({
                            service: service,
                            text: line,
                            isGray: line.includes('[GRAY ROUTE]')
                        });
                    });
                });
                
                if (allLogs.length === 0) {
                    container.innerHTML = '<div class="no-data">暂无路由日志</div>';
                    return;
                }
                
                container.innerHTML = allLogs.slice(-50).reverse().map(log => `
                    <div class="log-entry ${log.isGray ? 'gray' : 'normal'}">${log.text}</div>
                `).join('');
            } catch (error) {
                container.innerHTML = '<div class="no-data">加载日志失败</div>';
                showError('加载日志失败: ' + error.message);
            }
        }
        
        async function clearLogs() {
            if (!confirm('确定要清空所有路由日志吗？')) {
                return;
            }
            
            try {
                await fetch(`${GATEWAY_URL}/api/gray/logs`, { method: 'DELETE' });
                loadLogs();
                loadStats();
            } catch (error) {
                showError('清空日志失败: ' + error.message);
            }
        }
        
        async function loadRules() {
            const container = document.getElementById('rules-container');
            
            try {
                const data = await fetchAPI('/api/gray/rules');
                
                if (!data.rules || data.rules.length === 0) {
                    container.innerHTML = '<div class="no-data">暂无灰度规则配置</div>';
                    return;
                }
                
                container.innerHTML = `
                    <div class="services-grid">
                        ${data.rules.map(rule => `
                            <div class="service-card">
                                <div class="service-header">
                                    <span class="service-name">${rule.service}</span>
                                    <span class="service-status ${rule.enabled ? '' : 'disabled'}">
                                        ${rule.enabled ? '已启用' : '已禁用'}
                                    </span>
                                </div>
                                <div class="gray-rule-info" style="margin-top: 0; padding-top: 0; border-top: none;">
                                    <p>目标版本: <span class="version-badge ${rule.version}">${rule.version}</span></p>
                                    <p>灰度权重: <span class="weight">${rule.weight}%</span></p>
                                    <p>匹配条件:</p>
                                    ${rule.conditions && rule.conditions.length > 0 ? `
                                        <ul style="margin-left: 20px; margin-top: 10px;">
                                            ${rule.conditions.map(c => `
                                                <li style="margin-bottom: 5px;">${c.type} ${c.operator} [${c.values.join(', ')}]</li>
                                            `).join('')}
                                        </ul>
                                    ` : '<p style="margin-left: 20px;">无（仅基于权重）</p>'}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            } catch (error) {
                container.innerHTML = '<div class="no-data">加载规则配置失败</div>';
                showError('加载规则配置失败: ' + error.message);
            }
        }
        
        function loadAll() {
            loadStats();
            loadServices();
            loadLogs();
            loadRules();
        }
        
        // 初始加载
        loadAll();
        
        // 定时刷新（每5秒）
        setInterval(loadStats, 5000);
        setInterval(loadLogs, 10000);
    </script>
</body>
</html>
