<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>规则引擎管理</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }

        :root {
            --pixel-bg: #2d1b4e;
            --pixel-dark: #1a0f2e;
            --pixel-light: #4a3b69;
            --pixel-accent: #ff6b9d;
            --pixel-accent-dark: #c44569;
            --pixel-gold: #ffd700;
            --pixel-cyan: #00d9ff;
            --pixel-green: #00ff88;
        }

        body {
            min-height: 100vh;
            background-color: var(--pixel-bg);
            font-family: 'Press Start 2P', cursive;
            color: #fff;
            overflow-x: hidden;
            position: relative;
            font-size: 12px;
        }

        /* 像素背景网格 */
        .pixel-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(0,0,0,0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none;
            z-index: 0;
        }

        /* 扫描线效果 */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.1) 50%,
                rgba(0,0,0,0.1)
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 100;
            opacity: 0.3;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 10;
        }

        /* 返回链接 */
        .back-link {
            display: inline-block;
            margin-bottom: 30px;
            color: var(--pixel-cyan);
            text-decoration: none;
            font-size: 12px;
            text-shadow: 2px 2px 0 var(--pixel-dark);
            transition: all 0.1s;
        }

        .back-link:hover {
            color: var(--pixel-gold);
        }

        /* 像素风格标题框 */
        .title-box {
            background: var(--pixel-dark);
            border: 4px solid var(--pixel-light);
            padding: 30px 40px;
            position: relative;
            margin-bottom: 40px;
            text-align: center;
            box-shadow:
                0 0 0 4px var(--pixel-dark),
                0 0 0 8px var(--pixel-accent),
                0 0 30px rgba(255, 107, 157, 0.5);
        }

        /* 像素角标装饰 */
        .title-box::before,
        .title-box::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: var(--pixel-accent);
        }

        .title-box::before {
            top: -8px;
            left: -8px;
            box-shadow:
                calc(100% + 0px) 0 0 var(--pixel-accent),
                0 calc(100% + 0px) 0 var(--pixel-accent);
        }

        .title-box::after {
            bottom: -8px;
            right: -8px;
            box-shadow:
                calc(-100% - 0px) 0 0 var(--pixel-accent),
                0 calc(-100% - 0px) 0 var(--pixel-accent);
        }

        h1 {
            font-size: clamp(18px, 4vw, 28px);
            color: var(--pixel-gold);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            line-height: 1.5;
            text-shadow:
                4px 4px 0 var(--pixel-dark),
                -2px -2px 0 var(--pixel-accent);
        }

        /* 像素风格卡片 */
        .section {
            background: var(--pixel-dark);
            border: 4px solid var(--pixel-light);
            padding: 30px;
            margin-bottom: 30px;
            position: relative;
            box-shadow:
                0 0 0 4px var(--pixel-dark),
                0 0 20px rgba(0, 217, 255, 0.3);
        }

        .section::before {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border: 2px solid var(--pixel-cyan);
            clip-path: polygon(
                0 8px, 8px 8px, 8px 0,
                calc(100% - 8px) 0, calc(100% - 8px) 8px, 100% 8px,
                100% calc(100% - 8px), calc(100% - 8px) calc(100% - 8px), calc(100% - 8px) 100%,
                8px 100%, 8px calc(100% - 8px), 0 calc(100% - 8px)
            );
            pointer-events: none;
        }

        h2 {
            font-size: 14px;
            margin-bottom: 25px;
            color: var(--pixel-cyan);
            text-shadow: 2px 2px 0 var(--pixel-dark);
            letter-spacing: 0.1em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--pixel-gold);
            font-size: 10px;
            letter-spacing: 0.05em;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 4px solid var(--pixel-light);
            background: var(--pixel-bg);
            color: #fff;
            font-size: 12px;
            font-family: 'Press Start 2P', cursive;
            outline: none;
            transition: all 0.1s;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--pixel-cyan);
            box-shadow: 0 0 10px rgba(0, 217, 255, 0.3);
        }

        textarea {
            height: 100px;
            resize: vertical;
            line-height: 1.8;
        }

        /* 像素风格按钮 */
        .pixel-btn {
            display: inline-block;
            padding: 15px 25px;
            background: var(--pixel-accent);
            color: white;
            text-decoration: none;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            position: relative;
            border: none;
            cursor: pointer;
            transition: all 0.1s;
            font-family: 'Press Start 2P', cursive;
            margin-right: 15px;
            margin-bottom: 10px;
            box-shadow:
                0 6px 0 var(--pixel-accent-dark),
                0 6px 0 4px var(--pixel-dark);
        }

        .pixel-btn:hover {
            transform: translateY(4px);
            box-shadow:
                0 2px 0 var(--pixel-accent-dark),
                0 2px 0 4px var(--pixel-dark),
                0 0 20px rgba(255, 107, 157, 0.5);
            background: var(--pixel-gold);
        }

        .pixel-btn:active {
            transform: translateY(6px);
            box-shadow:
                0 0 0 var(--pixel-accent-dark),
                0 0 0 4px var(--pixel-dark);
        }

        .pixel-btn.secondary {
            background: var(--pixel-light);
            box-shadow:
                0 6px 0 #2d1b4e,
                0 6px 0 4px var(--pixel-dark);
        }

        .pixel-btn.secondary:hover {
            background: var(--pixel-cyan);
            box-shadow:
                0 2px 0 #2d1b4e,
                0 2px 0 4px var(--pixel-dark),
                0 0 20px rgba(0, 217, 255, 0.5);
        }

        .pixel-btn.success {
            background: var(--pixel-green);
            color: var(--pixel-dark);
            box-shadow:
                0 6px 0 #00aa55,
                0 6px 0 4px var(--pixel-dark);
        }

        .pixel-btn.success:hover {
            background: #00ffaa;
            box-shadow:
                0 2px 0 #00aa55,
                0 2px 0 4px var(--pixel-dark),
                0 0 20px rgba(0, 255, 136, 0.5);
        }

        .pixel-btn.warning {
            background: #ff9500;
            box-shadow:
                0 6px 0 #cc7700,
                0 6px 0 4px var(--pixel-dark);
        }

        .pixel-btn.warning:hover {
            background: #ffaa33;
            box-shadow:
                0 2px 0 #cc7700,
                0 2px 0 4px var(--pixel-dark),
                0 0 20px rgba(255, 149, 0, 0.5);
        }

        .rules-list {
            margin-top: 20px;
        }

        /* 像素风格规则项 */
        .rule-item {
            background: var(--pixel-bg);
            border: 4px solid var(--pixel-light);
            padding: 20px;
            margin-bottom: 15px;
            position: relative;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
        }

        .rule-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--pixel-accent);
        }

        .rule-item h3 {
            margin-bottom: 15px;
            color: var(--pixel-gold);
            font-size: 12px;
            text-shadow: 2px 2px 0 var(--pixel-dark);
        }

        .rule-item p {
            margin-bottom: 10px;
            font-size: 10px;
            line-height: 1.8;
            color: #ccc;
        }

        .rule-item strong {
            color: var(--pixel-cyan);
        }

        .status-enabled {
            display: inline-block;
            padding: 5px 10px;
            background: var(--pixel-green);
            color: var(--pixel-dark);
            font-size: 8px;
            margin-left: 10px;
            box-shadow: 2px 2px 0 rgba(0,0,0,0.3);
        }

        .status-disabled {
            display: inline-block;
            padding: 5px 10px;
            background: #666;
            color: #fff;
            font-size: 8px;
            margin-left: 10px;
            box-shadow: 2px 2px 0 rgba(0,0,0,0.3);
        }

        /* 像素风格模态框 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.8);
        }

        .modal-content {
            background: var(--pixel-dark);
            margin: 10% auto;
            padding: 30px;
            border: 4px solid var(--pixel-light);
            width: 90%;
            max-width: 600px;
            position: relative;
            box-shadow:
                0 0 0 4px var(--pixel-dark),
                0 0 0 8px var(--pixel-accent),
                0 0 50px rgba(255, 107, 157, 0.5);
        }

        .modal-content::before,
        .modal-content::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: var(--pixel-accent);
        }

        .modal-content::before {
            top: -8px;
            left: -8px;
            box-shadow:
                calc(100% + 0px) 0 0 var(--pixel-accent),
                0 calc(100% + 0px) 0 var(--pixel-accent);
        }

        .modal-content::after {
            bottom: -8px;
            right: -8px;
            box-shadow:
                calc(-100% - 0px) 0 0 var(--pixel-accent),
                0 calc(-100% - 0px) 0 var(--pixel-accent);
        }

        .close {
            color: var(--pixel-accent);
            float: right;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            text-shadow: 2px 2px 0 var(--pixel-dark);
        }

        .close:hover,
        .close:focus {
            color: var(--pixel-gold);
        }

        .execute-section {
            margin-top: 30px;
        }

        #result {
            margin-top: 20px;
            padding: 20px;
            background: var(--pixel-bg);
            border: 4px solid var(--pixel-light);
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            white-space: pre-wrap;
            color: var(--pixel-green);
            line-height: 1.8;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        /* 外部API规则卡片 */
        .api-rule-card {
            background: var(--pixel-bg);
            border: 4px solid var(--pixel-light);
            padding: 15px;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
        }

        .api-rule-card h4 {
            color: var(--pixel-cyan);
            font-size: 11px;
            margin-bottom: 10px;
        }

        .api-rule-card p {
            font-size: 9px;
            color: #888;
            margin-bottom: 8px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .container {
                padding: 20px 15px;
            }

            .title-box {
                padding: 20px 25px;
            }

            h1 {
                font-size: 16px;
            }

            .section {
                padding: 20px;
            }

            h2 {
                font-size: 12px;
            }

            .pixel-btn {
                padding: 12px 18px;
                font-size: 9px;
                width: 100%;
                margin-right: 0;
                text-align: center;
            }

            input, textarea, select {
                font-size: 10px;
                padding: 10px;
            }

            .modal-content {
                margin: 5% auto;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="pixel-bg"></div>
    <div class="scanlines"></div>

    <div class="container">
        <a href="/index.html" class="back-link">← 返回首页</a>

        <div class="title-box">
            <h1>⚙️ 规则引擎管理</h1>
        </div>

        <!-- 添加规则 -->
        <div class="section">
            <h2>添加规则</h2>

            <div class="form-group">
                <label>规则名称</label>
                <input type="text" id="ruleName" placeholder="请输入规则名称">
            </div>
            <div class="form-group">
                <label>条件 (JavaScript表达式)</label>
                <textarea id="ruleCondition" placeholder="例如: age > 18 && score >= 90"></textarea>
            </div>
            <div class="form-group">
                <label>动作 (JavaScript代码)</label>
                <textarea id="ruleAction" placeholder="例如: result = '优秀';"></textarea>
            </div>
            <div class="form-group">
                <label>优先级</label>
                <input type="number" id="rulePriority" value="1" min="1">
            </div>
            <button class="pixel-btn" onclick="addRule()">添加规则</button>
            <button class="pixel-btn secondary" onclick="loadExampleRule()">一键示例</button>
            <button class="pixel-btn secondary" onclick="loadExampleCompositeRule()">条件组合示例</button>
        </div>

        <!-- 规则列表 -->
        <div class="section">
            <h2>规则列表</h2>
            <div class="form-group">
                <label>显示模式：</label>
                <select id="listMode" onchange="loadRules()">
                    <option value="enabled">仅显示启用</option>
                    <option value="all">显示全部</option>
                </select>
            </div>
            <div id="rulesList" class="rules-list">
                <!-- 规则列表将通过JS动态生成 -->
            </div>
        </div>

        <!-- 外部API规则 -->
        <div class="section">
            <h2>🔗 外部API规则</h2>
            <p style="margin-bottom: 20px; color: #aaa; font-size: 10px; line-height: 1.8;">通过调用第三方接口来判断规则是否通过，如验证身份证是否为残疾人等</p>
            <button class="pixel-btn" onclick="window.open('/external-api.html', '_blank')">管理外部API配置</button>
            <button class="pixel-btn secondary" onclick="loadExternalApiRules()">加载API规则</button>
            <div id="externalApiRules" style="margin-top: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px;"></div>
        </div>

        <!-- 执行规则 -->
        <div class="section execute-section">
            <h2>执行规则</h2>
            <div class="form-group">
                <label>事实数据 (JSON格式)</label>
                <textarea id="factsJson" placeholder='例如: {"age": 20, "score": 95}'></textarea>
            </div>
            <button class="pixel-btn" onclick="executeRules()">执行规则</button>
            <button class="pixel-btn secondary" onclick="loadExampleFacts()">一键示例数据</button>
            <div id="result">执行结果将显示在这里</div>
        </div>
    </div>

    <!-- 修改规则模态框 -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 style="color: var(--pixel-gold); margin-bottom: 20px;">修改规则</h2>
            <input type="hidden" id="editRuleId">
            <div class="form-group">
                <label>规则名称</label>
                <input type="text" id="editRuleName" placeholder="请输入规则名称">
            </div>
            <div class="form-group">
                <label>条件 (JavaScript表达式)</label>
                <textarea id="editRuleCondition" placeholder="例如: age > 18 && score >= 90"></textarea>
            </div>
            <div class="form-group">
                <label>动作 (JavaScript代码)</label>
                <textarea id="editRuleAction" placeholder="例如: result = '优秀';"></textarea>
            </div>
            <div class="form-group">
                <label>优先级</label>
                <input type="number" id="editRulePriority" value="1" min="1">
            </div>
            <button class="pixel-btn" onclick="updateRule()">保存修改</button>
            <button class="pixel-btn secondary" onclick="closeModal()">取消</button>
        </div>
    </div>

    <script src="js/gateway-config.js"></script>
    <script>
        // 加载规则列表 - 通过Gateway访问
        function loadRules() {
            const listMode = document.getElementById('listMode').value;
            const url = listMode === 'all' ? GatewayConfig.getApiUrl('rules', '/list/all') : GatewayConfig.getApiUrl('rules', '/list');

            fetch(url)
                .then(response => response.json())
                .then(rules => {
                    const rulesList = document.getElementById('rulesList');
                    rulesList.innerHTML = '';

                    if (rules.length === 0) {
                        rulesList.innerHTML = '<p style="color: #888; font-size: 10px;">暂无规则</p>';
                        return;
                    }

                    rules.forEach(rule => {
                        const ruleItem = document.createElement('div');
                        ruleItem.className = 'rule-item';
                        const isEnabled = rule.enabled !== false;
                        const statusText = isEnabled ? '启用' : '停用';
                        const statusClass = isEnabled ? 'status-enabled' : 'status-disabled';
                        const toggleBtnText = isEnabled ? '停用' : '启用';
                        const toggleBtnClass = isEnabled ? 'warning' : 'success';

                        ruleItem.innerHTML = `
                            <h3>${rule.name} (ID: ${rule.id}) <span class="${statusClass}">${statusText}</span></h3>
                            <p><strong>条件:</strong> ${rule.condition}</p>
                            <p><strong>动作:</strong> ${rule.action}</p>
                            <p><strong>优先级:</strong> ${rule.priority}</p>
                            ${rule.version ? `<p><strong>版本:</strong> ${rule.version}</p>` : ''}
                            <button class="pixel-btn" style="padding: 10px 15px; font-size: 9px;" onclick='editRule(${JSON.stringify(rule)})'>编辑</button>
                            <button class="pixel-btn secondary" style="padding: 10px 15px; font-size: 9px;" onclick="removeRule('${rule.id}')">删除</button>
                            <button class="pixel-btn ${toggleBtnClass}" style="padding: 10px 15px; font-size: 9px;" onclick="toggleRuleStatus('${rule.id}', ${!isEnabled})">${toggleBtnText}</button>
                        `;
                        rulesList.appendChild(ruleItem);
                    });
                });
        }

        // 切换规则启用/停用状态 - 通过Gateway访问
        function toggleRuleStatus(ruleId, enabled) {
            fetch(GatewayConfig.getApiUrl('rules', `/toggle/${ruleId}?enabled=${enabled}`), {
                method: 'POST'
            })
            .then(response => response.text())
            .then(message => {
                alert(message);
                loadRules();
            });
        }

        // 添加规则
        function addRule() {
            const ruleName = document.getElementById('ruleName').value;
            const ruleCondition = document.getElementById('ruleCondition').value;
            const ruleAction = document.getElementById('ruleAction').value;
            const rulePriority = parseInt(document.getElementById('rulePriority').value);

            if (!ruleName || !ruleCondition || !ruleAction) {
                alert('请填写所有字段');
                return;
            }

            fetch(GatewayConfig.getApiUrl('rules', '/add'), {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    name: ruleName,
                    condition: ruleCondition,
                    action: ruleAction,
                    priority: rulePriority
                })
            })
            .then(response => response.text())
            .then(message => {
                alert(message);
                loadRules();
                // 清空表单
                document.getElementById('ruleName').value = '';
                document.getElementById('ruleCondition').value = '';
                document.getElementById('ruleAction').value = '';
                document.getElementById('rulePriority').value = 1;
            });
        }

        // 删除规则 - 通过Gateway访问
        function removeRule(ruleId) {
            if (confirm('确定要删除这条规则吗？')) {
                fetch(GatewayConfig.getApiUrl('rules', `/remove/${ruleId}`), {
                    method: 'DELETE'
                })
                .then(response => response.text())
                .then(message => {
                    alert(message);
                    loadRules();
                });
            }
        }

        // 执行规则
        function executeRules() {
            const factsJson = document.getElementById('factsJson').value;

            if (!factsJson) {
                alert('请输入事实数据');
                return;
            }

            try {
                const facts = JSON.parse(factsJson);

                fetch(GatewayConfig.getApiUrl('rules', '/execute'), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(facts)
                })
                .then(response => response.json())
                .then(result => {
                    document.getElementById('result').textContent = JSON.stringify(result, null, 2);
                });
            } catch (e) {
                alert('JSON格式错误');
            }
        }

        // 编辑规则
        function editRule(rule) {
            document.getElementById('editRuleId').value = rule.id;
            document.getElementById('editRuleName').value = rule.name;
            document.getElementById('editRuleCondition').value = rule.condition;
            document.getElementById('editRuleAction').value = rule.action;
            document.getElementById('editRulePriority').value = rule.priority;
            document.getElementById('editModal').style.display = 'block';
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        // 更新规则
        function updateRule() {
            const ruleId = document.getElementById('editRuleId').value;
            const ruleName = document.getElementById('editRuleName').value;
            const ruleCondition = document.getElementById('editRuleCondition').value;
            const ruleAction = document.getElementById('editRuleAction').value;
            const rulePriority = parseInt(document.getElementById('editRulePriority').value);

            if (!ruleName || !ruleCondition || !ruleAction) {
                alert('请填写所有字段');
                return;
            }

            fetch(GatewayConfig.getApiUrl('rules', '/update'), {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    id: ruleId,
                    name: ruleName,
                    condition: ruleCondition,
                    action: ruleAction,
                    priority: rulePriority
                })
            })
            .then(response => response.text())
            .then(message => {
                alert(message);
                loadRules();
                closeModal();
            });
        }

        // 加载示例规则
        function loadExampleRule() {
            document.getElementById('ruleName').value = '成年人判断';
            document.getElementById('ruleCondition').value = 'age >= 18';
            document.getElementById('ruleAction').value = 'result = "成年人";';
            document.getElementById('rulePriority').value = 1;
        }

        // 加载条件组合示例规则
        function loadExampleCompositeRule() {
            document.getElementById('ruleName').value = '成绩等级判断';
            document.getElementById('ruleCondition').value = '(score >= 90 AND attendance >= 0.9) OR (score >= 80 AND attendance >= 0.8 AND extraCredit > 0)';
            document.getElementById('ruleAction').value = 'result = "优秀";';
            document.getElementById('rulePriority').value = 2;
        }

        // 加载示例事实数据
        function loadExampleFacts() {
            document.getElementById('factsJson').value = '{"age": 20, "score": 95}';
        }

        // 加载外部API规则列表 - 通过Gateway访问
        function loadExternalApiRules() {
            fetch(GatewayConfig.getApiUrl('external', '/config/list/enabled'))
            .then(response => response.json())
            .then(apis => {
                const container = document.getElementById('externalApiRules');
                if (apis.length === 0) {
                    container.innerHTML = '<p style="color: #888; font-size: 10px;">暂无启用的外部API配置</p>';
                    return;
                }

                let html = '';
                apis.forEach(api => {
                    html += `
                        <div class="api-rule-card">
                            <h4>${api.apiName}</h4>
                            <p>ID: ${api.apiId}</p>
                            <p>${api.apiUrl}</p>
                            <p>${api.description || '暂无描述'}</p>
                            <button class="pixel-btn" style="padding: 8px 12px; font-size: 8px;" onclick="createApiRule('${api.apiId}', '${api.apiName}')">创建规则</button>
                        </div>
                    `;
                });
                container.innerHTML = html;
            })
            .catch(error => {
                document.getElementById('externalApiRules').innerHTML = '<p style="color: var(--pixel-accent); font-size: 10px;">加载失败：' + error + '</p>';
            });
        }

        // 创建外部API规则
        function createApiRule(apiId, apiName) {
            const ruleName = prompt('请输入规则名称：', apiName + '规则');
            if (!ruleName) return;

            const priority = prompt('请输入优先级（数字越大优先级越高）：', '1');
            if (!priority) return;

            fetch(GatewayConfig.getApiUrl('rules', '/add'), {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    name: ruleName,
                    condition: 'EXTERNAL_API:' + apiId,
                    action: '调用外部API: ' + apiName,
                    priority: parseInt(priority)
                })
            })
            .then(response => response.text())
            .then(message => {
                alert(message);
                loadRules();
            })
            .catch(error => {
                alert('创建规则失败：' + error);
            });
        }

        // 页面加载时加载规则列表
        window.onload = function() {
            loadRules();
            loadExternalApiRules();
        };

        // 点击模态框外部关闭
        window.onclick = function(event) {
            const modal = document.getElementById('editModal');
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
