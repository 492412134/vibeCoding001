<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>规则引擎管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            color: #fff;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        h1 {
            text-align: center;
            font-size: 3vw;
            margin-bottom: 40px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
        
        .section {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }
        
        h2 {
            font-size: 1.5vw;
            margin-bottom: 20px;
            color: #667eea;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 14px;
        }
        
        textarea {
            height: 100px;
            resize: vertical;
        }
        
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-right: 10px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        
        .rules-list {
            margin-top: 20px;
        }
        
        .rule-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }
        
        .btn-secondary {
            background: linear-gradient(45deg, #4a5568 0%, #2d3748 100%);
            margin-left: 10px;
        }
        
        .btn-warning {
            background: linear-gradient(45deg, #ed8936 0%, #dd6b20 100%);
            margin-left: 10px;
        }
        
        .btn-success {
            background: linear-gradient(45deg, #48bb78 0%, #38a169 100%);
            margin-left: 10px;
        }
        
        .status-enabled {
            display: inline-block;
            padding: 2px 8px;
            background: linear-gradient(45deg, #48bb78 0%, #38a169 100%);
            color: white;
            border-radius: 4px;
            font-size: 12px;
            margin-left: 10px;
        }
        
        .status-disabled {
            display: inline-block;
            padding: 2px 8px;
            background: linear-gradient(45deg, #a0aec0 0%, #718096 100%);
            color: white;
            border-radius: 4px;
            font-size: 12px;
            margin-left: 10px;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.5);
        }
        
        .modal-content {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            margin: 15% auto;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 15px;
            width: 80%;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
        }
        
        .close:hover,
        .close:focus {
            color: white;
            text-decoration: none;
            cursor: pointer;
        }
        
        .rule-item h3 {
            margin-bottom: 10px;
            color: #667eea;
        }
        
        .rule-item p {
            margin-bottom: 5px;
            font-size: 14px;
        }
        
        .execute-section {
            margin-top: 30px;
        }
        
        #result {
            margin-top: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            font-family: monospace;
            white-space: pre-wrap;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 6vw;
            }
            h2 {
                font-size: 4vw;
            }
            .section {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="margin-bottom: 20px;">
            <a href="/index.html" style="color: #667eea; text-decoration: none; font-size: 16px;">
                ← 返回首页
            </a>
        </div>
        <h1>规则引擎管理</h1>
        
        <!-- 添加规则 -->
        <div class="section">
            <h2>添加规则</h2>

            <div class="form-group">
                <label>规则名称</label>
                <input type="text" id="ruleName" placeholder="请输入规则名称">
            </div>
            <div class="form-group">
                <label>条件 (JavaScript表达式)</label>
                <textarea id="ruleCondition" placeholder="例如: age > 18 && score >= 90"></textarea>
            </div>
            <div class="form-group">
                <label>动作 (JavaScript代码)</label>
                <textarea id="ruleAction" placeholder="例如: result = '优秀';"></textarea>
            </div>
            <div class="form-group">
                <label>优先级</label>
                <input type="number" id="rulePriority" value="1" min="1">
            </div>
            <button class="btn" onclick="addRule()">添加规则</button>
            <button class="btn btn-secondary" onclick="loadExampleRule()">一键示例</button>
            <button class="btn btn-secondary" onclick="loadExampleCompositeRule()">条件组合示例</button>
        </div>
        
        <!-- 规则列表 -->
        <div class="section">
            <h2>规则列表</h2>
            <div class="form-group">
                <label>显示模式：</label>
                <select id="listMode" onchange="loadRules()">
                    <option value="enabled">仅显示启用</option>
                    <option value="all">显示全部</option>
                </select>
            </div>
            <div id="rulesList" class="rules-list">
                <!-- 规则列表将通过JS动态生成 -->
            </div>
        </div>

        <!-- 外部API规则 -->
        <div class="section">
            <h2>🔗 外部API规则</h2>
            <p style="margin-bottom: 15px; color: #aaa;">通过调用第三方接口来判断规则是否通过，如验证身份证是否为残疾人等</p>
            <button class="btn" onclick="window.open('/external-api.html', '_blank')">管理外部API配置</button>
            <button class="btn btn-secondary" onclick="loadExternalApiRules()">加载API规则</button>
            <div id="externalApiRules" style="margin-top: 20px;"></div>
        </div>
        
        <!-- 执行规则 -->
        <div class="section execute-section">
            <h2>执行规则</h2>
            <div class="form-group">
                <label>事实数据 (JSON格式)</label>
                <textarea id="factsJson" placeholder='例如: {"age": 20, "score": 95}'></textarea>
            </div>
            <button class="btn" onclick="executeRules()">执行规则</button>
            <button class="btn btn-secondary" onclick="loadExampleFacts()">一键示例数据</button>
            <div id="result">执行结果将显示在这里</div>
        </div>
    </div>
    
    <!-- 修改规则模态框 -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>修改规则</h2>
            <input type="hidden" id="editRuleId">
            <div class="form-group">
                <label>规则名称</label>
                <input type="text" id="editRuleName" placeholder="请输入规则名称">
            </div>
            <div class="form-group">
                <label>条件 (JavaScript表达式)</label>
                <textarea id="editRuleCondition" placeholder="例如: age > 18 && score >= 90"></textarea>
            </div>
            <div class="form-group">
                <label>动作 (JavaScript代码)</label>
                <textarea id="editRuleAction" placeholder="例如: result = '优秀';"></textarea>
            </div>
            <div class="form-group">
                <label>优先级</label>
                <input type="number" id="editRulePriority" value="1" min="1">
            </div>
            <button class="btn" onclick="updateRule()">保存修改</button>
            <button class="btn btn-secondary" onclick="closeModal()">取消</button>
        </div>
    </div>
    
    <script src="js/gateway-config.js"></script>
    <script>
        // 加载规则列表 - 通过Gateway访问
        function loadRules() {
            const listMode = document.getElementById('listMode').value;
            const url = listMode === 'all' ? GatewayConfig.getApiUrl('rules', '/list/all') : GatewayConfig.getApiUrl('rules', '/list');
            
            fetch(url)
                .then(response => response.json())
                .then(rules => {
                    const rulesList = document.getElementById('rulesList');
                    rulesList.innerHTML = '';
                    
                    if (rules.length === 0) {
                        rulesList.innerHTML = '<p>暂无规则</p>';
                        return;
                    }
                    
                    rules.forEach(rule => {
                        const ruleItem = document.createElement('div');
                        ruleItem.className = 'rule-item';
                        const isEnabled = rule.enabled !== false;
                        const statusText = isEnabled ? '启用' : '停用';
                        const statusClass = isEnabled ? 'status-enabled' : 'status-disabled';
                        const toggleBtnText = isEnabled ? '停用' : '启用';
                        const toggleBtnClass = isEnabled ? 'btn-warning' : 'btn-success';
                        
                        ruleItem.innerHTML = `
                            <h3>${rule.name} (ID: ${rule.id}) <span class="${statusClass}">${statusText}</span></h3>
                            <p><strong>条件:</strong> ${rule.condition}</p>
                            <p><strong>动作:</strong> ${rule.action}</p>
                            <p><strong>优先级:</strong> ${rule.priority}</p>
                            ${rule.version ? `<p><strong>版本:</strong> ${rule.version}</p>` : ''}
                            <button class="btn" onclick='editRule(${JSON.stringify(rule)})'>编辑</button>
                            <button class="btn btn-secondary" onclick="removeRule('${rule.id}')">删除</button>
                            <button class="btn ${toggleBtnClass}" onclick="toggleRuleStatus('${rule.id}', ${!isEnabled})">${toggleBtnText}</button>
                        `;
                        rulesList.appendChild(ruleItem);
                    });
                });
        }
        
        // 切换规则启用/停用状态 - 通过Gateway访问
        function toggleRuleStatus(ruleId, enabled) {
            fetch(GatewayConfig.getApiUrl('rules', `/toggle/${ruleId}?enabled=${enabled}`), {
                method: 'POST'
            })
            .then(response => response.text())
            .then(message => {
                alert(message);
                loadRules();
            });
        }
        
        // 添加规则
        function addRule() {
            const ruleName = document.getElementById('ruleName').value;
            const ruleCondition = document.getElementById('ruleCondition').value;
            const ruleAction = document.getElementById('ruleAction').value;
            const rulePriority = parseInt(document.getElementById('rulePriority').value);
            
            if (!ruleName || !ruleCondition || !ruleAction) {
                alert('请填写所有字段');
                return;
            }
            
            fetch(GatewayConfig.getApiUrl('rules', '/add'), {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    name: ruleName,
                    condition: ruleCondition,
                    action: ruleAction,
                    priority: rulePriority
                })
            })
            .then(response => response.text())
            .then(message => {
                alert(message);
                loadRules();
                // 清空表单
                document.getElementById('ruleName').value = '';
                document.getElementById('ruleCondition').value = '';
                document.getElementById('ruleAction').value = '';
                document.getElementById('rulePriority').value = 1;
            });
        }

        // 删除规则 - 通过Gateway访问
        function removeRule(ruleId) {
            if (confirm('确定要删除这条规则吗？')) {
                fetch(GatewayConfig.getApiUrl('rules', `/remove/${ruleId}`), {
                    method: 'DELETE'
                })
                .then(response => response.text())
                .then(message => {
                    alert(message);
                    loadRules();
                });
            }
        }
        
        // 执行规则
        function executeRules() {
            const factsJson = document.getElementById('factsJson').value;
            
            if (!factsJson) {
                alert('请输入事实数据');
                return;
            }
            
            try {
                const facts = JSON.parse(factsJson);
                
                fetch(GatewayConfig.getApiUrl('rules', '/execute'), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(facts)
                })
                .then(response => response.json())
                .then(result => {
                    document.getElementById('result').textContent = JSON.stringify(result, null, 2);
                });
            } catch (e) {
                alert('JSON格式错误');
            }
        }
        
        // 编辑规则
        function editRule(rule) {
            document.getElementById('editRuleId').value = rule.id;
            document.getElementById('editRuleName').value = rule.name;
            document.getElementById('editRuleCondition').value = rule.condition;
            document.getElementById('editRuleAction').value = rule.action;
            document.getElementById('editRulePriority').value = rule.priority;
            document.getElementById('editModal').style.display = 'block';
        }
        
        // 关闭模态框
        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }
        
        // 更新规则
        function updateRule() {
            const ruleId = document.getElementById('editRuleId').value;
            const ruleName = document.getElementById('editRuleName').value;
            const ruleCondition = document.getElementById('editRuleCondition').value;
            const ruleAction = document.getElementById('editRuleAction').value;
            const rulePriority = parseInt(document.getElementById('editRulePriority').value);
            
            if (!ruleName || !ruleCondition || !ruleAction) {
                alert('请填写所有字段');
                return;
            }
            
            fetch(GatewayConfig.getApiUrl('rules', '/update'), {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    id: ruleId,
                    name: ruleName,
                    condition: ruleCondition,
                    action: ruleAction,
                    priority: rulePriority
                })
            })
            .then(response => response.text())
            .then(message => {
                alert(message);
                loadRules();
                closeModal();
            });
        }
        
        // 加载示例规则
        function loadExampleRule() {
            document.getElementById('ruleName').value = '成年人判断';
            document.getElementById('ruleCondition').value = 'age >= 18';
            document.getElementById('ruleAction').value = 'result = "成年人";';
            document.getElementById('rulePriority').value = 1;
        }
        
        // 加载条件组合示例规则
        function loadExampleCompositeRule() {
            document.getElementById('ruleName').value = '成绩等级判断';
            document.getElementById('ruleCondition').value = '(score >= 90 AND attendance >= 0.9) OR (score >= 80 AND attendance >= 0.8 AND extraCredit > 0)';
            document.getElementById('ruleAction').value = 'result = "优秀";';
            document.getElementById('rulePriority').value = 2;
        }
        
        // 加载示例事实数据
        function loadExampleFacts() {
            document.getElementById('factsJson').value = '{"age": 20, "score": 95}';
        }
        
        // 加载外部API规则列表 - 通过Gateway访问
        function loadExternalApiRules() {
            fetch(GatewayConfig.getApiUrl('external', '/config/list/enabled'))
            .then(response => response.json())
            .then(apis => {
                const container = document.getElementById('externalApiRules');
                if (apis.length === 0) {
                    container.innerHTML = '<p style="color: #aaa;">暂无启用的外部API配置</p>';
                    return;
                }

                let html = '<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px;">';
                apis.forEach(api => {
                    html += `
                        <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px;">
                            <h4 style="color: #667eea; margin-bottom: 10px;">${api.apiName}</h4>
                            <p style="font-size: 12px; color: #aaa; margin-bottom: 5px;">ID: ${api.apiId}</p>
                            <p style="font-size: 12px; margin-bottom: 10px;">${api.apiUrl}</p>
                            <p style="font-size: 12px; color: #888; margin-bottom: 10px;">${api.description || '暂无描述'}</p>
                            <button class="btn" style="padding: 8px 15px; font-size: 12px;" onclick="createApiRule('${api.apiId}', '${api.apiName}')">创建规则</button>
                        </div>
                    `;
                });
                html += '</div>';
                container.innerHTML = html;
            })
            .catch(error => {
                document.getElementById('externalApiRules').innerHTML = '<p style="color: #ff6b6b;">加载失败：' + error + '</p>';
            });
        }

        // 创建外部API规则
        function createApiRule(apiId, apiName) {
            const ruleName = prompt('请输入规则名称：', apiName + '规则');
            if (!ruleName) return;

            const priority = prompt('请输入优先级（数字越大优先级越高）：', '1');
            if (!priority) return;

            fetch(GatewayConfig.getApiUrl('rules', '/add'), {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    name: ruleName,
                    condition: 'EXTERNAL_API:' + apiId,
                    action: '调用外部API: ' + apiName,
                    priority: parseInt(priority)
                })
            })
            .then(response => response.text())
            .then(message => {
                alert(message);
                loadRules();
            })
            .catch(error => {
                alert('创建规则失败：' + error);
            });
        }

        // 页面加载时加载规则列表
        window.onload = function() {
            loadRules();
            loadExternalApiRules();
        };
    </script>
</body>
</html>
