<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Vibe 系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group input::placeholder {
            color: #bfbfbf;
        }

        .form-error {
            color: #ff4d4f;
            font-size: 13px;
            margin-top: 8px;
            min-height: 20px;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .btn-login:hover {
            opacity: 0.9;
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .login-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #666;
        }

        .login-footer a {
            color: #667eea;
            text-decoration: none;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .back-link:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <a href="/" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        返回首页
    </a>

    <div class="login-container">
        <div class="login-header">
            <h1>欢迎登录</h1>
            <p>Vibe 微服务管理系统</p>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="username">用户名</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="请输入用户名" 
                    required
                    autocomplete="username"
                >
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="请输入密码" 
                    required
                    autocomplete="current-password"
                >
            </div>

            <div class="form-error" id="error-message"></div>

            <button type="submit" class="btn-login" id="submit-btn">
                登录
            </button>
        </form>

        <div class="login-footer">
            <p>测试账号: admin / admin123 或 test / user123</p>
        </div>
    </div>

    <script src="/js/auth-service.js"></script>
    <script>
        // 获取URL参数
        function getUrlParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        // 如果已登录，跳转到首页或指定页面
        if (AuthService.isLoggedIn()) {
            const redirect = getUrlParam('redirect') || '/';
            window.location.href = redirect;
        }

        const form = document.getElementById('login-form');
        const submitBtn = document.getElementById('submit-btn');
        const errorMessage = document.getElementById('error-message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            // 清除错误信息
            errorMessage.textContent = '';

            // 验证
            if (!username) {
                errorMessage.textContent = '请输入用户名';
                return;
            }
            if (!password) {
                errorMessage.textContent = '请输入密码';
                return;
            }

            // 显示加载状态
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading"></span>登录中...';

            try {
                const result = await AuthService.login(username, password);

                if (result.success) {
                    // 获取跳转地址
                    const redirect = getUrlParam('redirect') || '/';
                    
                    // 显示成功提示
                    submitBtn.innerHTML = '登录成功！';
                    submitBtn.style.background = '#52c41a';

                    // 延迟跳转
                    setTimeout(() => {
                        window.location.href = redirect;
                    }, 500);
                } else {
                    errorMessage.textContent = result.message || '用户名或密码错误';
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '登录';
                }
            } catch (error) {
                console.error('登录失败:', error);
                errorMessage.textContent = '网络错误，请稍后重试';
                submitBtn.disabled = false;
                submitBtn.innerHTML = '登录';
            }
        });

        // 回车键提交
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                form.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
