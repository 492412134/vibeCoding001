<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 千年鼠妖</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }

        :root {
            --pixel-bg: #2d1b4e;
            --pixel-dark: #1a0f2e;
            --pixel-light: #4a3b69;
            --pixel-accent: #ff6b9d;
            --pixel-accent-dark: #c44569;
            --pixel-gold: #ffd700;
            --pixel-cyan: #00d9ff;
            --pixel-green: #00ff88;
            --pixel-red: #ff4757;
        }

        body {
            min-height: 100vh;
            background-color: var(--pixel-bg);
            font-family: 'Press Start 2P', cursive;
            overflow-x: hidden;
            position: relative;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 像素背景网格 */
        .pixel-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(0,0,0,0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none;
            z-index: 0;
        }

        /* 扫描线效果 */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.1) 50%,
                rgba(0,0,0,0.1)
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 100;
            opacity: 0.3;
        }

        .login-container {
            position: relative;
            z-index: 10;
            background: var(--pixel-dark);
            border: 4px solid var(--pixel-light);
            padding: 40px;
            width: 90%;
            max-width: 450px;
            box-shadow:
                0 0 0 4px var(--pixel-dark),
                0 0 0 8px var(--pixel-accent),
                0 0 30px rgba(255, 107, 157, 0.5);
        }

        /* 像素角标装饰 */
        .login-container::before,
        .login-container::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: var(--pixel-accent);
        }

        .login-container::before {
            top: -8px;
            left: -8px;
            box-shadow:
                calc(100% + 0px) 0 0 var(--pixel-accent),
                0 calc(100% + 0px) 0 var(--pixel-accent);
        }

        .login-container::after {
            bottom: -8px;
            right: -8px;
            box-shadow:
                calc(-100% - 0px) 0 0 var(--pixel-accent),
                0 calc(-100% - 0px) 0 var(--pixel-accent);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: var(--pixel-gold);
            font-size: 24px;
            margin-bottom: 15px;
            text-shadow:
                3px 3px 0 var(--pixel-dark),
                -1px -1px 0 var(--pixel-accent);
            animation: pixelGlow 2s ease-in-out infinite alternate;
        }

        @keyframes pixelGlow {
            from {
                text-shadow:
                    3px 3px 0 var(--pixel-dark),
                    -1px -1px 0 var(--pixel-accent),
                    0 0 10px var(--pixel-gold);
            }
            to {
                text-shadow:
                    3px 3px 0 var(--pixel-dark),
                    -1px -1px 0 var(--pixel-accent),
                    0 0 20px var(--pixel-gold),
                    0 0 40px var(--pixel-gold);
            }
        }

        .login-header p {
            color: var(--pixel-cyan);
            font-size: 10px;
            letter-spacing: 0.2em;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: var(--pixel-cyan);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            background: var(--pixel-bg);
            border: 3px solid var(--pixel-light);
            color: var(--pixel-gold);
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            outline: none;
            transition: all 0.1s;
        }

        .form-group input:focus {
            border-color: var(--pixel-accent);
            box-shadow: 0 0 10px rgba(255, 107, 157, 0.3);
        }

        .form-group input::placeholder {
            color: var(--pixel-light);
            font-size: 10px;
        }

        .form-error {
            color: var(--pixel-red);
            font-size: 10px;
            margin-top: 10px;
            min-height: 20px;
            text-align: center;
        }

        .btn-login {
            width: 100%;
            padding: 20px;
            background: var(--pixel-accent);
            color: white;
            border: none;
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            position: relative;
            transition: all 0.1s;
            box-shadow:
                0 6px 0 var(--pixel-accent-dark),
                0 6px 0 4px var(--pixel-dark);
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(4px);
            box-shadow:
                0 2px 0 var(--pixel-accent-dark),
                0 2px 0 4px var(--pixel-dark),
                0 0 20px rgba(255, 107, 157, 0.6);
            background: var(--pixel-gold);
        }

        .btn-login:active {
            transform: translateY(6px);
            box-shadow:
                0 0 0 var(--pixel-accent-dark),
                0 0 0 4px var(--pixel-dark);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow:
                0 6px 0 var(--pixel-accent-dark),
                0 6px 0 4px var(--pixel-dark);
        }

        .btn-login.success {
            background: var(--pixel-green);
            box-shadow:
                0 6px 0 #00cc6a,
                0 6px 0 4px var(--pixel-dark);
        }

        .login-footer {
            text-align: center;
            margin-top: 25px;
            font-size: 8px;
            color: var(--pixel-light);
            line-height: 2;
        }

        .login-footer span {
            color: var(--pixel-cyan);
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--pixel-cyan);
            text-decoration: none;
            font-size: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 20;
            text-shadow: 2px 2px 0 var(--pixel-dark);
        }

        .back-link:hover {
            color: var(--pixel-gold);
        }

        .pixel-icon {
            text-align: center;
            font-size: 48px;
            margin-bottom: 20px;
            animation: bounce 0.6s ease-in-out infinite alternate;
            filter: drop-shadow(3px 3px 0 var(--pixel-dark));
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-8px); }
        }

        .loading {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #ffffff;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .login-container {
                padding: 30px 20px;
            }

            .login-header h1 {
                font-size: 18px;
            }

            .form-group input {
                padding: 12px;
                font-size: 10px;
            }

            .btn-login {
                padding: 15px;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="pixel-bg"></div>
    <div class="scanlines"></div>

    <a href="/" class="back-link">
        <span>←</span> 返回首页
    </a>

    <div class="login-container">
        <div class="pixel-icon">🔐</div>

        <div class="login-header">
            <h1>欢迎登录</h1>
            <p>VIBE SYSTEM_</p>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="username">用户名</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="请输入用户名"
                    required
                    autocomplete="username"
                >
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="请输入密码"
                    required
                    autocomplete="current-password"
                >
            </div>

            <div class="form-error" id="error-message"></div>

            <button type="submit" class="btn-login" id="submit-btn">
                登录
            </button>
        </form>

        <div class="login-footer">
            <p>测试账号: <span>admin / admin123</span></p>
            <p>或 <span>test / user123</span></p>
        </div>
    </div>

    <script src="/js/auth-service.js"></script>
    <script>
        function getUrlParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        if (AuthService.isLoggedIn()) {
            const redirect = getUrlParam('redirect') || '/';
            window.location.href = redirect;
        }

        const form = document.getElementById('login-form');
        const submitBtn = document.getElementById('submit-btn');
        const errorMessage = document.getElementById('error-message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            errorMessage.textContent = '';

            if (!username) {
                errorMessage.textContent = '请输入用户名';
                return;
            }
            if (!password) {
                errorMessage.textContent = '请输入密码';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading"></span>登录中...';

            try {
                const result = await AuthService.login(username, password);

                if (result.success) {
                    const redirect = getUrlParam('redirect') || '/';
                    submitBtn.innerHTML = '登录成功！';
                    submitBtn.classList.add('success');

                    setTimeout(() => {
                        window.location.href = redirect;
                    }, 800);
                } else {
                    errorMessage.textContent = result.message || '用户名或密码错误';
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '登录';
                }
            } catch (error) {
                console.error('登录失败:', error);
                errorMessage.textContent = '网络错误，请稍后重试';
                submitBtn.disabled = false;
                submitBtn.innerHTML = '登录';
            }
        });

        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                form.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
