<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单查询 - 像素风</title>
    <link rel="stylesheet" href="css/payment-demo.css">
    <style>
        /* 订单查询页面特有样式 */
        .query-section {
            background: rgba(0, 0, 0, 0.3);
            border: 4px solid var(--pixel-border);
            padding: 20px;
            margin-bottom: 20px;
        }

        .query-form {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            color: var(--pixel-accent);
            font-size: 12px;
            text-transform: uppercase;
        }

        .form-group input,
        .form-group select {
            background: var(--pixel-bg);
            border: 2px solid var(--pixel-border);
            color: var(--pixel-text);
            padding: 8px 12px;
            font-family: inherit;
            font-size: 14px;
            min-width: 150px;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--pixel-accent);
            box-shadow: 0 0 0 2px rgba(78, 205, 196, 0.3);
        }

        .btn-query {
            background: linear-gradient(180deg, #4ecdc4 0%, #44a08d 100%);
            border: none;
            padding: 10px 20px;
            color: #fff;
            font-family: inherit;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 0 #2d6a4f;
            transition: all 0.1s;
        }

        .btn-query:hover {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #2d6a4f;
        }

        .btn-query:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .orders-table-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        .orders-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .orders-table th,
        .orders-table td {
            border: 2px solid var(--pixel-border);
            padding: 10px;
            text-align: left;
        }

        .orders-table th {
            background: rgba(78, 205, 196, 0.2);
            color: var(--pixel-accent);
            font-weight: bold;
            text-transform: uppercase;
        }

        .orders-table tr:nth-child(even) {
            background: rgba(255, 255, 255, 0.05);
        }

        .orders-table tr:hover {
            background: rgba(78, 205, 196, 0.1);
        }

        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            font-size: 10px;
            border-radius: 0;
            text-transform: uppercase;
        }

        .status-pending {
            background: #ffd93d;
            color: #000;
        }

        .status-processing {
            background: #6bcf7f;
            color: #000;
        }

        .status-success {
            background: #4ecdc4;
            color: #000;
        }

        .status-failed {
            background: #ff6b6b;
            color: #fff;
        }

        .status-timeout {
            background: #ff8c42;
            color: #000;
        }

        .id-cell {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: var(--pixel-accent);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--pixel-text-secondary);
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 4px solid var(--pixel-border);
            border-top-color: var(--pixel-accent);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .query-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .query-tab {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid var(--pixel-border);
            padding: 8px 16px;
            color: var(--pixel-text);
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .query-tab.active,
        .query-tab:hover {
            background: var(--pixel-accent);
            color: #000;
            border-color: var(--pixel-accent);
        }

        .query-panel {
            display: none;
        }

        .query-panel.active {
            display: block;
        }

        .snowflake-info {
            background: rgba(78, 205, 196, 0.1);
            border-left: 4px solid var(--pixel-accent);
            padding: 15px;
            margin-bottom: 20px;
        }

        .snowflake-info h3 {
            color: var(--pixel-accent);
            margin-bottom: 10px;
        }

        .snowflake-info p {
            font-size: 12px;
            line-height: 1.6;
            color: var(--pixel-text-secondary);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="pixel-header">
            <h1 class="pixel-title">
                <span class="pixel-icon">📋</span>
                订单查询系统
            </h1>
            <p class="pixel-subtitle">基于雪花算法ID的订单管理</p>
        </header>

        <!-- 雪花算法说明 -->
        <div class="snowflake-info">
            <h3>🆔 雪花算法ID说明</h3>
            <p>
                每个订单都使用雪花算法生成唯一的64位ID，包含：时间戳（41位）+ 政策类型（4位）+ 政策编号（10位）+ 序列号（8位）+ 表索引（1位）。<br>
                支持按政策类型（common/old_man/edu/live）、政策编号、时间范围等多种方式查询。
            </p>
        </div>

        <!-- 查询标签页 -->
        <div class="query-tabs">
            <button class="query-tab active" onclick="switchTab('latest')">最新订单</button>
            <button class="query-tab" onclick="switchTab('snowflake')">雪花ID查询</button>
            <button class="query-tab" onclick="switchTab('policy')">政策类型查询</button>
            <button class="query-tab" onclick="switchTab('time')">时间范围查询</button>
        </div>

        <!-- 最新订单面板 -->
        <div id="panel-latest" class="query-panel active">
            <div class="query-section">
                <div class="query-form">
                    <div class="form-group">
                        <label>查询数量</label>
                        <input type="number" id="latest-limit" value="20" min="1" max="100">
                    </div>
                    <button class="btn-query" onclick="queryLatestOrders()">查询</button>
                </div>
            </div>
        </div>

        <!-- 雪花ID查询面板 -->
        <div id="panel-snowflake" class="query-panel">
            <div class="query-section">
                <div class="query-form">
                    <div class="form-group">
                        <label>雪花ID</label>
                        <input type="number" id="snowflake-id" placeholder="输入雪花ID">
                    </div>
                    <button class="btn-query" onclick="queryBySnowflakeId()">查询</button>
                </div>
            </div>
        </div>

        <!-- 政策类型查询面板 -->
        <div id="panel-policy" class="query-panel">
            <div class="query-section">
                <div class="query-form">
                    <div class="form-group">
                        <label>政策类型</label>
                        <select id="policy-type">
                            <option value="common">common - 普通</option>
                            <option value="old_man">old_man - 养老</option>
                            <option value="edu">edu - 教育</option>
                            <option value="live">live - 生活</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>政策编号（可选）</label>
                        <input type="number" id="policy-code" placeholder="输入政策编号">
                    </div>
                    <div class="form-group">
                        <label>查询数量</label>
                        <input type="number" id="policy-limit" value="20" min="1" max="100">
                    </div>
                    <button class="btn-query" onclick="queryByPolicy()">查询</button>
                </div>
            </div>
        </div>

        <!-- 时间范围查询面板 -->
        <div id="panel-time" class="query-panel">
            <div class="query-section">
                <div class="query-form">
                    <div class="form-group">
                        <label>开始时间</label>
                        <input type="datetime-local" id="start-time">
                    </div>
                    <div class="form-group">
                        <label>结束时间</label>
                        <input type="datetime-local" id="end-time">
                    </div>
                    <div class="form-group">
                        <label>查询数量</label>
                        <input type="number" id="time-limit" value="20" min="1" max="100">
                    </div>
                    <button class="btn-query" onclick="queryByTimeRange()">查询</button>
                </div>
            </div>
        </div>

        <!-- 订单列表 -->
        <div class="query-section">
            <h3 class="section-title">📊 查询结果</h3>
            <div id="orders-container" class="orders-table-container">
                <div class="empty-state">请点击上方查询按钮获取订单数据</div>
            </div>
        </div>

        <!-- 返回首页 -->
        <div style="text-align: center; margin-top: 30px;">
            <a href="index.html" class="btn-query">返回首页</a>
        </div>
    </div>

    <script src="js/gateway-config.js"></script>
    <script>
        // 通过Gateway访问支付服务API
        const API_BASE = GatewayConfig.apiPrefix.payment;

        // 切换查询标签
        function switchTab(tab) {
            document.querySelectorAll('.query-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.query-panel').forEach(p => p.classList.remove('active'));
            document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
            document.getElementById(`panel-${tab}`).classList.add('active');
        }

        // 获取状态样式
        function getStatusClass(status) {
            const statusMap = {
                'PENDING': 'status-pending',
                'PROCESSING': 'status-processing',
                'SUCCESS': 'status-success',
                'FAILED': 'status-failed',
                'TIMEOUT': 'status-timeout'
            };
            return statusMap[status] || 'status-pending';
        }

        // 渲染订单表格
        function renderOrders(orders) {
            const container = document.getElementById('orders-container');
            if (!orders || orders.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无订单数据</div>';
                return;
            }

            const html = `
                <table class="orders-table">
                    <thead>
                        <tr>
                            <th>雪花ID</th>
                            <th>请求ID</th>
                            <th>姓名</th>
                            <th>身份证</th>
                            <th>金额</th>
                            <th>状态</th>
                            <th>政策类型</th>
                            <th>政策编号</th>
                            <th>订单类型</th>
                            <th>创建时间</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${orders.map(order => `
                            <tr>
                                <td class="id-cell">${order.snowflakeId || '-'}</td>
                                <td class="id-cell">${order.requestId || '-'}</td>
                                <td>${order.name || '-'}</td>
                                <td>${order.idcard || '-'}</td>
                                <td>¥${order.amount || '0.00'}</td>
                                <td><span class="status-badge ${getStatusClass(order.status)}">${order.status || '-'}</span></td>
                                <td>${order.policyType || '-'}</td>
                                <td>${order.policyCode || '-'}</td>
                                <td>${order.orderType || '-'}</td>
                                <td>${order.createTime ? new Date(order.createTime).toLocaleString() : '-'}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            container.innerHTML = html;
        }

        // 显示加载中
        function showLoading() {
            document.getElementById('orders-container').innerHTML = '<div class="loading"></div>';
        }

        // 查询最新订单
        async function queryLatestOrders() {
            showLoading();
            const limit = document.getElementById('latest-limit').value;
            try {
                const response = await fetch(`${API_BASE}/orders/latest?limit=${limit}`);
                const result = await response.json();
                if (result.code === 200) {
                    renderOrders(result.data);
                } else {
                    document.getElementById('orders-container').innerHTML = `<div class="empty-state">查询失败: ${result.message}</div>`;
                }
            } catch (error) {
                document.getElementById('orders-container').innerHTML = `<div class="empty-state">查询出错: ${error.message}</div>`;
            }
        }

        // 根据雪花ID查询
        async function queryBySnowflakeId() {
            showLoading();
            const snowflakeId = document.getElementById('snowflake-id').value;
            if (!snowflakeId) {
                alert('请输入雪花ID');
                return;
            }
            try {
                const response = await fetch(`${API_BASE}/orders/${snowflakeId}`);
                const result = await response.json();
                if (result.code === 200) {
                    renderOrders([result.data]);
                } else {
                    document.getElementById('orders-container').innerHTML = `<div class="empty-state">${result.message}</div>`;
                }
            } catch (error) {
                document.getElementById('orders-container').innerHTML = `<div class="empty-state">查询出错: ${error.message}</div>`;
            }
        }

        // 根据政策类型查询
        async function queryByPolicy() {
            showLoading();
            const policyType = document.getElementById('policy-type').value;
            const policyCode = document.getElementById('policy-code').value;
            const limit = document.getElementById('policy-limit').value;

            try {
                let url;
                if (policyCode) {
                    url = `${API_BASE}/orders/policy?policyType=${policyType}&policyCode=${policyCode}&limit=${limit}`;
                } else {
                    url = `${API_BASE}/orders/policy-type/${policyType}?limit=${limit}`;
                }
                const response = await fetch(url);
                const result = await response.json();
                if (result.code === 200) {
                    renderOrders(result.data);
                } else {
                    document.getElementById('orders-container').innerHTML = `<div class="empty-state">查询失败: ${result.message}</div>`;
                }
            } catch (error) {
                document.getElementById('orders-container').innerHTML = `<div class="empty-state">查询出错: ${error.message}</div>`;
            }
        }

        // 根据时间范围查询
        async function queryByTimeRange() {
            showLoading();
            const startTime = document.getElementById('start-time').value;
            const endTime = document.getElementById('end-time').value;
            const limit = document.getElementById('time-limit').value;

            if (!startTime || !endTime) {
                alert('请选择开始和结束时间');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/orders/time-range?startTime=${startTime}&endTime=${endTime}&limit=${limit}`);
                const result = await response.json();
                if (result.code === 200) {
                    renderOrders(result.data);
                } else {
                    document.getElementById('orders-container').innerHTML = `<div class="empty-state">查询失败: ${result.message}</div>`;
                }
            } catch (error) {
                document.getElementById('orders-container').innerHTML = `<div class="empty-state">查询出错: ${error.message}</div>`;
            }
        }

        // 页面加载时自动查询最新订单
        window.onload = function() {
            queryLatestOrders();
        };
    </script>
</body>
</html>
