# Docker 环境配置
# 覆盖默认的 application.yml 配置

spring:
  cloud:
    nacos:
      discovery:
        server-addr: host.docker.internal:8848
      config:
        server-addr: host.docker.internal:8848
  
  datasource:
    # Docker 环境下使用 ShardingSphere
    url: jdbc:shardingsphere:classpath:sharding-config-docker.yaml
    driver-class-name: org.apache.shardingsphere.driver.ShardingSphereDriver

  data:
    redis:
      host: host.docker.internal
      port: 6379

server:
  port: 10991
