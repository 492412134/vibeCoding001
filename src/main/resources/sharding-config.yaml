# ShardingSphere 分库分表配置
# 用于 payment_request 表的分表

dataSources:
  # 主数据源
  ds_0:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: jdbc:mysql://localhost:3306/rule_engine?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: sr123456
    connectionTimeoutMilliseconds: 30000
    idleTimeoutMilliseconds: 600000
    maxLifetimeMilliseconds: 1800000
    maximumPoolSize: 10
    minimumIdle: 5

rules:
  # 分片规则
  - !SHARDING
    tables:
      # payment_request 表分片配置
      payment_request:
        # 实际数据节点：ds_0.payment_request_0, ds_0.payment_request_1, ... ds_0.payment_request_15
        actualDataNodes: ds_0.payment_request_${0..15}
        # 分表策略
        tableStrategy:
          standard:
            # 使用雪花ID的 policyCode 字段作为分片键
            shardingColumn: policy_code
            # 分片算法
            shardingAlgorithmName: payment_table_inline
        # 分布式主键生成策略
        keyGenerateStrategy:
          column: snowflake_id
          keyGeneratorName: snowflake
    
    # 分片算法配置
    shardingAlgorithms:
      payment_table_inline:
        type: INLINE
        props:
          # policy_code % 16 决定分到哪张表
          algorithm-expression: payment_request_${policy_code % 16}
    
    # 分布式主键生成器
    keyGenerators:
      snowflake:
        type: SNOWFLAKE
        props:
          # 工作节点ID（0-1023），单机环境固定为0
          worker-id: 0
          # 最大抖动上限（毫秒）
          max-tolerate-time-difference-milliseconds: 10

# 属性配置
props:
  # 显示SQL
  sql-show: true
  # 简单SQL优化
  sql-simple: true
  # 执行器大小
  executor-size: 16
  # 最大连接数
  max-connections-size-per-query: 1
